<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hello Fashion Admin</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="site-header compact">
      <div>
        <p class="eyebrow">Admin panel</p>
        <h1>Hello Fashion</h1>
      </div>
      <a class="admin-link" href="/">View site</a>
    </header>

    <main class="admin-layout">
      <section id="loginPanel" class="panel">
        <h2>Login</h2>
        <form id="loginForm">
          <label>
            Password
            <input id="passwordInput" type="password" autocomplete="current-password" required />
          </label>
          <button type="submit">Login</button>
        </form>
      </section>

      <section id="adminPanel" class="panel hidden">
        <div class="panel-heading">
          <h2>Products</h2>
          <button id="logoutButton" type="button" class="secondary">Logout</button>
        </div>

        <form id="productForm" class="product-form">
          <input id="productId" type="hidden" />
          <label>
            Product name
            <input id="titleInput" required placeholder="Example: Pink Kurti Set" />
          </label>
          <label>
            Price
            <input id="priceInput" placeholder="Example: Rs. 799" />
          </label>
          <label>
            Category
            <input id="categoryInput" placeholder="Example: Kurti" />
          </label>
          <label>
            Image URL
            <input id="imageInput" placeholder="Paste photo URL" />
          </label>
          <label>
            Video URL
            <input id="videoInput" placeholder="YouTube or MP4 URL" />
          </label>
          <label>
            Sort order
            <input id="sortInput" type="number" value="0" />
          </label>
          <label class="full">
            Description
            <textarea id="descriptionInput" rows="3" placeholder="Short product details"></textarea>
          </label>
          <label class="checkbox">
            <input id="activeInput" type="checkbox" checked />
            Show on website
          </label>
          <div class="form-actions">
            <button type="submit">Save Product</button>
            <button id="resetButton" type="button" class="secondary">New Product</button>
          </div>
        </form>

        <div id="adminProducts" class="admin-products"></div>
      </section>
    </main>

    <script src="/admin.js"></script>
  </body>
</html>
